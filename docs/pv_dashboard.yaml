# =============================================================================
# PV Napoved Dashboard — CLSS Shade
# =============================================================================
# Predpogoji (HACS):
#   - apexcharts-card
#   - mushroom (mushroom-entity-card, mushroom-chips-card)
#
# Zamenjajte "parcela" z imenom vase CLSS Shade konfiguracije.
#
# Uporaba: v Lovelace UI izberite "Edit Dashboard" > tri pike > "Raw
# configuration editor" in prilepite ta YAML kot novo view.
# =============================================================================

title: PV Napoved
icon: mdi:solar-power-variant
path: pv-napoved
type: sections
max_columns: 2
sections:

  # =============================================
  # SECTION 1: Status chips
  # =============================================
  - type: grid
    cards:
      - type: custom:mushroom-chips-card
        chips:
          - type: entity
            entity: sensor.parcela_realna_pv_moc
            icon: mdi:solar-panel
            name: Realno
            content_info: state
          - type: entity
            entity: sensor.parcela_ocena_pv_moci
            icon: mdi:solar-power
            name: Ocena
            content_info: state
          - type: entity
            entity: sensor.parcela_pv_faktor_ucinkovitosti
            icon: mdi:chart-bell-curve
            name: Faktor
            content_info: state
          - type: entity
            entity: sensor.parcela_pv_napoved_naslednja_ura
            icon: mdi:flash
            name: Nasl. ura
            content_info: state

  # =============================================
  # SECTION 2: Casovna okna
  # =============================================
  - type: grid
    columns: 4
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.parcela_pv_naslednja_ura_wh
        name: Naslednja 1h
        icon: mdi:clock-fast
        primary_info: state
        secondary_info: name
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: sensor.parcela_pv_naslednje_3_ure_wh
        name: Naslednje 3h
        icon: mdi:clock-outline
        primary_info: state
        secondary_info: name
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: sensor.parcela_pv_preostanek_danes
        name: Preostanek danes
        icon: mdi:sun-clock
        primary_info: state
        secondary_info: name
        layout: vertical
      - type: custom:mushroom-entity-card
        entity: sensor.parcela_pv_napoved_jutri
        name: Jutri skupaj
        icon: mdi:solar-power-variant-outline
        primary_info: state
        secondary_info: name
        layout: vertical

  # =============================================
  # SECTION 3: Danes — urna krivulja
  # =============================================
  - type: grid
    cards:
      - type: custom:apexcharts-card
        header:
          title: "Danes — PV proizvodnja"
          show: true
        graph_span: 18h
        span:
          start: day
          offset: "+5h"
        apex_config:
          chart:
            height: 280
          tooltip:
            x:
              format: "HH:mm"
          yaxis:
            - title:
                text: "W"
              min: 0
        series:
          - entity: sensor.parcela_pv_napoved_danes
            name: Napoved
            type: area
            color: "#FFA726"
            opacity: 0.3
            stroke_width: 2
            data_generator: |
              const data = entity.attributes.forecast_hourly;
              if (!data) return [];
              return data.map(e => [new Date(e.time).getTime(), e.estimate_w]);
          - entity: sensor.parcela_realna_pv_moc
            name: Realno
            type: line
            color: "#66BB6A"
            stroke_width: 3
            group_by:
              func: avg
              duration: 30min

  # =============================================
  # SECTION 4: Jutri — urna krivulja
  # =============================================
  - type: grid
    cards:
      - type: custom:apexcharts-card
        header:
          title: "Jutri — PV napoved"
          show: true
        graph_span: 18h
        span:
          start: day
          offset: "+29h"
        apex_config:
          chart:
            height: 250
          tooltip:
            x:
              format: "HH:mm"
          yaxis:
            - title:
                text: "W"
              min: 0
        series:
          - entity: sensor.parcela_pv_napoved_jutri
            name: Napoved
            type: area
            color: "#42A5F5"
            opacity: 0.3
            stroke_width: 2
            data_generator: |
              const data = entity.attributes.forecast_hourly;
              if (!data) return [];
              return data.map(e => [new Date(e.time).getTime(), e.estimate_w]);

  # =============================================
  # SECTION 5: 5-dnevni stolpci
  # =============================================
  - type: grid
    cards:
      - type: custom:apexcharts-card
        header:
          title: "5-dnevna napoved (kWh/dan)"
          show: true
        apex_config:
          chart:
            height: 250
            type: bar
          plotOptions:
            bar:
              columnWidth: "60%"
              borderRadius: 4
              dataLabels:
                position: top
          dataLabels:
            enabled: true
            offsetY: -20
            style:
              fontSize: "12px"
              colors:
                - "#304758"
          xaxis:
            type: category
          yaxis:
            - title:
                text: "kWh"
              min: 0
        series:
          - entity: sensor.parcela_pv_napoved_5_dni
            name: kWh
            type: column
            color: "#FFA726"
            data_generator: |
              const days = entity.attributes.days;
              if (!days) return [];
              return days.map(d => [d.label, d.total_kwh]);

  # =============================================
  # SECTION 6: Performance + 5-dnevna krivulja
  # =============================================
  - type: grid
    columns: 2
    cards:
      - type: gauge
        entity: sensor.parcela_pv_faktor_ucinkovitosti
        name: "Natancnost napovedi"
        min: 0
        max: 2
        needle: true
        segments:
          - from: 0
            color: "#F44336"
            label: "Nizka"
          - from: 0.7
            color: "#FF9800"
            label: "Srednja"
          - from: 0.85
            color: "#4CAF50"
            label: "Dobra"
          - from: 1.15
            color: "#FF9800"
            label: "Podcenjena"
          - from: 1.3
            color: "#F44336"
            label: "Prevec"
      - type: custom:apexcharts-card
        header:
          title: "5-dnevna krivulja"
          show: true
        apex_config:
          chart:
            height: 200
          tooltip:
            x:
              format: "dd.MM HH:mm"
          yaxis:
            - title:
                text: "W"
              min: 0
        series:
          - entity: sensor.parcela_pv_napoved_5_dni
            name: Napoved
            type: area
            color: "#AB47BC"
            opacity: 0.2
            stroke_width: 2
            data_generator: |
              const data = entity.attributes.forecast_hourly_5day;
              if (!data) return [];
              return data.map(e => [new Date(e.time).getTime(), e.estimate_w]);
