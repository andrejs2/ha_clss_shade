<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLSS Shade — Zone Editor</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" crossorigin="" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
      background: #1c1c1c; color: #e0e0e0;
    }
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: #1e1e2e; border-bottom: 1px solid #333;
      min-height: 48px; flex-shrink: 0;
    }
    .toolbar h1 { font-size: 16px; font-weight: 600; margin-right: auto; }
    .toolbar .status { font-size: 12px; color: #888; }
    .toolbar button {
      padding: 6px 14px; border: 1px solid #555; border-radius: 6px;
      background: #2a2a3e; color: #e0e0e0; cursor: pointer; font-size: 13px;
    }
    .toolbar button:hover { background: #3a3a5e; }
    .toolbar button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .toolbar button.primary:hover { background: #1d4ed8; }
    .toolbar button.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
    .toolbar button.danger:hover { background: #b91c1c; }
    #map { flex: 1; z-index: 0; }
    #viewer3d {
      flex: 1; display: none; position: relative;
      background: #1a1a2e;
    }
    #viewer3d.active { display: block; }
    #map.hidden { display: none; }
    .toolbar button.active {
      background: #2563eb; border-color: #2563eb; color: #fff;
    }
    #loading3d {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #888; font-size: 14px; z-index: 10;
    }

    /* Zone list sidebar */
    .sidebar {
      position: absolute; top: 56px; right: 8px; z-index: 1000;
      background: rgba(30, 30, 46, 0.95); border-radius: 8px;
      padding: 12px; min-width: 220px; max-width: 300px;
      max-height: calc(100vh - 72px); overflow-y: auto;
      border: 1px solid #444; backdrop-filter: blur(8px);
    }
    .sidebar h2 { font-size: 14px; margin-bottom: 8px; color: #aaa; }
    .zone-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 4px; margin-bottom: 4px;
      cursor: pointer; font-size: 13px;
    }
    .zone-item:hover { background: rgba(255,255,255,0.08); }
    .zone-item .color-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .zone-item .name { flex: 1; }
    .zone-item .type { color: #888; font-size: 11px; }
    .zone-item .delete-btn {
      opacity: 0; background: none; border: none; color: #f87171;
      cursor: pointer; font-size: 14px; padding: 2px 4px;
    }
    .zone-item:hover .delete-btn { opacity: 1; }
    .zone-item.auto .delete-btn { display: none; }

    /* Modal dialog */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6); z-index: 2000;
      justify-content: center; align-items: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: #1e1e2e; border-radius: 12px; padding: 24px;
      min-width: 320px; max-width: 420px; border: 1px solid #444;
    }
    .modal h3 { margin-bottom: 16px; font-size: 16px; }
    .modal label { display: block; margin-bottom: 4px; font-size: 13px; color: #aaa; }
    .modal input, .modal select {
      width: 100%; padding: 8px 10px; margin-bottom: 12px;
      background: #2a2a3e; border: 1px solid #555; border-radius: 6px;
      color: #e0e0e0; font-size: 14px;
    }
    .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .modal button {
      padding: 8px 16px; border: 1px solid #555; border-radius: 6px;
      background: #2a2a3e; color: #e0e0e0; cursor: pointer; font-size: 13px;
    }
    .modal button.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .modal button.cancel { background: transparent; }

    /* Help text */
    .help-text {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(30, 30, 46, 0.9); padding: 8px 16px;
      border-radius: 8px; font-size: 13px; color: #aaa;
      pointer-events: none; text-align: center;
    }

    /* Draw toolbar: light background so dark sprite icons are visible */
    .leaflet-draw-toolbar a {
      background-color: #e8e8e8 !important;
      border-color: #999 !important;
    }
    .leaflet-draw-toolbar a:hover {
      background-color: #fff !important;
    }
    /* Action buttons (Finish, Delete, Cancel) */
    .leaflet-draw-actions li a {
      background: #2c2c44 !important; color: #fff !important;
      border-color: #555 !important; font-size: 13px !important;
    }
    .leaflet-draw-actions li a:hover { background: #4c4c7a !important; }
    /* Zoom buttons */
    .leaflet-control-zoom a {
      background: #e8e8e8 !important; color: #333 !important;
      border-color: #999 !important;
    }
    .leaflet-control-zoom a:hover { background: #fff !important; }

    /* ALL vertex markers: bright red dots — nuclear override v3 */
    .leaflet-div-icon,
    .leaflet-editing-icon,
    .leaflet-marker-icon.leaflet-div-icon,
    .leaflet-marker-icon.leaflet-editing-icon,
    .vertex-red,
    .leaflet-marker-icon.vertex-red {
      background: #ff2222 !important;
      border: 2px solid #ffffff !important;
      border-radius: 50% !important;
      width: 12px !important;
      height: 12px !important;
      margin-left: -6px !important;
      margin-top: -6px !important;
      box-shadow: 0 0 6px 2px rgba(255,34,34,0.8) !important;
      opacity: 1 !important;
    }
  </style>
</head>
<body>

<div class="toolbar">
  <h1>CLSS Shade — Zone Editor <small style="color:#666;font-size:11px">v11</small></h1>
  <span class="status" id="status">Nalagam...</span>
  <button id="btn-2d" class="active">2D</button>
  <button id="btn-3d">3D</button>
  <button id="btn-draw3d" style="display:none">+ 3D Cona</button>
  <button id="btn-finish3d" class="primary" style="display:none">Zaključi</button>
  <button id="btn-cancel3d" class="danger" style="display:none">Prekliči</button>
  <span id="draw3d-status" style="display:none;font-size:12px;color:#4ade80"></span>
  <button class="primary" id="btn-save" disabled>Shrani</button>
</div>

<div id="map"></div>
<div id="viewer3d"><div id="loading3d">Nalagam 3D teren...</div></div>

<div class="sidebar" id="sidebar">
  <h2>Cone</h2>
  <div id="zone-list"></div>
  <div id="zone-list-3d" style="display:none">
    <div style="height:1px;background:#444;margin:8px 0"></div>
    <h2>3D Cone</h2>
    <div id="zone-list-3d-items"></div>
  </div>
</div>

<div class="help-text" id="help-text">
  Uporabi orodja na levi za risanje con. Klikni poligon za urejanje.
</div>

<!-- Name/type dialog -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Nova cona</h3>
    <label for="zone-name">Ime cone</label>
    <input type="text" id="zone-name" placeholder="npr. borovnice, vrt, terasa..." />
    <label for="zone-type">Tip cone</label>
    <select id="zone-type">
      <option value="custom">Custom</option>
      <option value="garden">Vrt / Garden</option>
      <option value="terrace">Terasa / Terrace</option>
      <option value="pv">PV paneli / Solar</option>
      <option value="parking">Parkirišče</option>
      <option value="pool">Bazen / Pool</option>
    </select>
    <label for="zone-color">Barva</label>
    <input type="color" id="zone-color" value="#2196F3" />
    <div class="btn-row">
      <button class="cancel" id="modal-cancel">Prekliči</button>
      <button class="primary" id="modal-ok">Dodaj</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js" crossorigin=""></script>

<script>
(function() {
  'use strict';

  // ─── HA connection ───
  function getHass() {
    try {
      if (window.parent && window.parent.document) {
        const ha = window.parent.document.querySelector('home-assistant');
        if (ha && ha.hass) return ha.hass;
      }
    } catch(e) {}
    try {
      const ha = document.querySelector('home-assistant');
      if (ha && ha.hass) return ha.hass;
    } catch(e) {}
    return null;
  }

  async function callWS(type, data) {
    const hass = getHass();
    if (!hass || !hass.callWS) throw new Error('HA connection not available');
    return await hass.callWS({ type, ...data });
  }

  // ─── State ───
  let map, drawnItems, drawControl;
  let config = null;      // { entries: [...] }
  let activeEntry = null; // first entry
  let customZones = [];   // local working copy
  let dirty = false;
  let pendingLayer = null;

  const ZONE_COLORS = {
    custom:  '#2196F3',
    garden:  '#4CAF50',
    terrace: '#FF9800',
    pv:      '#FFC107',
    parking: '#9E9E9E',
    pool:    '#00BCD4',
    roof:    '#F44336',
    trees:   '#388E3C',
    open:    '#8BC34A',
  };

  // ─── Init ───
  async function init() {
    setStatus('Povezujem z HA...');

    // Retry getting HA connection (iframe may load before parent)
    let retries = 0;
    while (!getHass() && retries < 30) {
      await new Promise(r => setTimeout(r, 300));
      retries++;
    }

    if (!getHass()) {
      setStatus('Napaka: ni HA povezave');
      return;
    }

    try {
      config = await callWS('ha_clss_shade/get_config', {});
    } catch(e) {
      setStatus('Napaka: ' + e.message);
      return;
    }

    if (!config.entries || config.entries.length === 0) {
      setStatus('Ni konfigurirane lokacije');
      return;
    }

    activeEntry = config.entries[0];
    customZones = JSON.parse(JSON.stringify(activeEntry.zones || []));

    initMap();
    loadZonesOnMap();
    setStatus(activeEntry.title + ' — ' + customZones.length + ' con');
    document.getElementById('btn-save').disabled = false;
  }

  function initMap() {
    const lat = activeEntry.latitude;
    const lng = activeEntry.longitude;

    map = L.map('map', {
      center: [lat, lng],
      zoom: 20,
      zoomControl: true,
      maxZoom: 23,
    });

    // Tile layers — multiple sources for best coverage
    var googleSat = L.tileLayer(
      'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',
      { maxZoom: 22, maxNativeZoom: 21, attribution: 'Google' }
    );
    var googleHybrid = L.tileLayer(
      'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
      { maxZoom: 22, maxNativeZoom: 21, attribution: 'Google' }
    );
    var esriSat = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      { maxZoom: 22, maxNativeZoom: 19, attribution: 'Esri' }
    );
    var osm = L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { maxZoom: 22, maxNativeZoom: 19, attribution: 'OSM' }
    );
    // Default: Google satellite
    googleSat.addTo(map);

    // Layer control
    var baseMaps = {
      'Google Satelit': googleSat,
      'Google Hybrid (+ ceste)': googleHybrid,
      'Esri Satelit': esriSat,
      'OpenStreetMap': osm,
    };
    L.control.layers(baseMaps, null, { position: 'bottomleft', collapsed: true }).addTo(map);

    // Center marker
    L.circleMarker([lat, lng], {
      radius: 6, fillColor: '#ff0000', fillOpacity: 0.8,
      color: '#fff', weight: 2,
    }).addTo(map).bindTooltip('Center', { permanent: false });

    // Radius circle
    L.circle([lat, lng], {
      radius: activeEntry.radius,
      color: '#ff0000', weight: 1, fillOpacity: 0.05, dashArray: '5 5',
    }).addTo(map);

    // Drawn items layer
    drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // Custom vertex icons — bright red dots 18px
    var vertexIcon = new L.DivIcon({
      className: 'leaflet-div-icon leaflet-editing-icon vertex-red',
      iconSize: new L.Point(12, 12),
    });

    // Override ALL Leaflet.draw prototypes BEFORE creating draw control
    L.Draw.Polyline.prototype.options.icon = vertexIcon;
    L.Draw.Polyline.prototype.options.touchIcon = vertexIcon;
    if (L.Edit && L.Edit.PolyVerticesEdit) {
      L.Edit.PolyVerticesEdit.prototype.options.icon = vertexIcon;
      L.Edit.PolyVerticesEdit.prototype.options.touchIcon = vertexIcon;
    }

    // Draw control — polygon + rectangle
    drawControl = new L.Control.Draw({
      position: 'topleft',
      draw: {
        polygon: {
          allowIntersection: false,
          showArea: true,
          shapeOptions: { color: '#2196F3', weight: 2, fillOpacity: 0.3 },
          metric: true,
        },
        rectangle: {
          showArea: true,
          shapeOptions: { color: '#2196F3', weight: 2, fillOpacity: 0.3 },
          metric: true,
        },
        polyline: false,
        circle: false,
        circlemarker: false,
        marker: false,
      },
      edit: {
        featureGroup: drawnItems,
        remove: true,
        edit: true,
        poly: { icon: vertexIcon, touchIcon: vertexIcon },
      }
    });
    map.addControl(drawControl);

    // Event handlers
    map.on(L.Draw.Event.CREATED, onDrawCreated);
    map.on(L.Draw.Event.EDITED, onDrawEdited);
    map.on(L.Draw.Event.DELETED, onDrawDeleted);
  }

  // ─── Draw events ───
  function onDrawCreated(e) {
    pendingLayer = e.layer;
    showModal();
  }

  function findZoneByName(name) {
    return customZones.findIndex(function(z) { return z.name === name; });
  }

  function onDrawEdited(e) {
    e.layers.eachLayer(function(layer) {
      var name = layer._clssZoneName;
      if (!name) return;
      var idx = findZoneByName(name);
      if (idx >= 0) {
        var coords = layer.getLatLngs()[0].map(function(ll) { return [ll.lat, ll.lng]; });
        customZones[idx].vertices = coords;
      }
    });
    markDirty();
    refreshZoneList();
  }

  function onDrawDeleted(e) {
    var namesToRemove = [];
    e.layers.eachLayer(function(layer) {
      if (layer._clssZoneName) {
        namesToRemove.push(layer._clssZoneName);
      }
    });
    customZones = customZones.filter(function(z) {
      return namesToRemove.indexOf(z.name) === -1;
    });
    markDirty();
    refreshZoneList();
  }

  // ─── Modal ───
  function showModal() {
    document.getElementById('zone-name').value = '';
    document.getElementById('zone-type').value = 'custom';
    document.getElementById('zone-color').value = '#2196F3';
    document.getElementById('modal-overlay').classList.add('active');
    setTimeout(() => document.getElementById('zone-name').focus(), 100);
  }

  function hideModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    if (pendingLayer) {
      pendingLayer = null;
    }
  }

  document.getElementById('modal-cancel').addEventListener('click', hideModal);

  document.getElementById('modal-ok').addEventListener('click', function() {
    const name = document.getElementById('zone-name').value.trim().toLowerCase().replace(/\s+/g, '_');
    const zoneType = document.getElementById('zone-type').value;
    const color = document.getElementById('zone-color').value;

    if (!name) {
      document.getElementById('zone-name').style.borderColor = '#f44336';
      return;
    }

    // Check duplicate names
    const existing = customZones.map(z => z.name);
    const autoNames = ['roof', 'garden', 'trees', 'open'];
    if (existing.includes(name) || autoNames.includes(name)) {
      alert('Ime cone "' + name + '" že obstaja!');
      return;
    }

    // Get vertices from drawn layer
    const coords = pendingLayer.getLatLngs()[0].map(ll => [ll.lat, ll.lng]);

    const zone = {
      name: name,
      zone_type: zoneType,
      shape: 'polygon',
      vertices: coords,
      color: color,
    };

    customZones.push(zone);

    // Style and add to map
    pendingLayer.setStyle({
      color: color,
      fillColor: color,
      fillOpacity: 0.3,
      weight: 2,
    });
    pendingLayer._clssZoneName = name;
    pendingLayer.bindTooltip(name, { permanent: true, direction: 'center', className: 'zone-label' });
    drawnItems.addLayer(pendingLayer);
    pendingLayer = null;

    hideModal();
    markDirty();
    refreshZoneList();
  });

  // Enter key in modal
  document.getElementById('zone-name').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('modal-ok').click();
  });

  // ─── Load existing zones ───
  function loadZonesOnMap() {
    drawnItems.clearLayers();

    customZones.forEach(function(zone, idx) {
      if (zone.shape !== 'polygon' || !zone.vertices || zone.vertices.length < 3) return;

      const latlngs = zone.vertices.map(function(v) {
        return L.latLng(v[0], v[1]);
      });

      const color = zone.color || ZONE_COLORS[zone.zone_type] || '#2196F3';
      const layer = L.polygon(latlngs, {
        color: color,
        fillColor: color,
        fillOpacity: 0.3,
        weight: 2,
      });
      layer._clssZoneName = zone.name;
      layer.bindTooltip(zone.name, { permanent: true, direction: 'center' });
      drawnItems.addLayer(layer);
    });

    refreshZoneList();
  }

  // ─── Zone list sidebar ───
  function refreshZoneList() {
    const list = document.getElementById('zone-list');
    list.innerHTML = '';

    if (customZones.length === 0) {
      list.innerHTML = '<div style="color:#666;font-size:12px;padding:4px">Ni uporabniških con. Nariši poligon na karti.</div>';
      return;
    }

    customZones.forEach(function(zone) {
      var div = document.createElement('div');
      div.className = 'zone-item';

      var color = zone.color || ZONE_COLORS[zone.zone_type] || '#2196F3';
      var vCount = (zone.vertices || []).length;
      var zoneName = zone.name;

      div.innerHTML =
        '<span class="color-dot" style="background:' + color + '"></span>' +
        '<span class="name">' + zoneName + '</span>' +
        '<span class="type">' + zone.zone_type + ' (' + vCount + ')</span>' +
        '<button class="delete-btn" title="Odstrani">&times;</button>';

      // Click to zoom
      div.addEventListener('click', function(e) {
        if (e.target.classList.contains('delete-btn')) return;
        zoomToZone(zoneName);
      });

      // Delete button
      div.querySelector('.delete-btn').addEventListener('click', function() {
        deleteZone(zoneName);
      });

      list.appendChild(div);
    });
  }

  function zoomToZone(name) {
    var idx = findZoneByName(name);
    if (idx < 0) return;
    var zone = customZones[idx];
    if (!zone.vertices || zone.vertices.length < 3) return;
    var bounds = L.latLngBounds(zone.vertices.map(function(v) { return L.latLng(v[0], v[1]); }));
    map.fitBounds(bounds, { padding: [50, 50] });
  }

  function deleteZone(name) {
    // Remove layer from map
    drawnItems.eachLayer(function(layer) {
      if (layer._clssZoneName === name) {
        drawnItems.removeLayer(layer);
      }
    });

    customZones = customZones.filter(function(z) { return z.name !== name; });

    markDirty();
    refreshZoneList();
  }

  // ─── Save ───
  document.getElementById('btn-save').addEventListener('click', async function() {
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Shranjujem...';

    try {
      // Sync layer positions back to zones (in case of edits)
      drawnItems.eachLayer(function(layer) {
        var name = layer._clssZoneName;
        if (!name || !layer.getLatLngs) return;
        var idx = findZoneByName(name);
        if (idx >= 0) {
          var coords = layer.getLatLngs()[0].map(function(ll) { return [ll.lat, ll.lng]; });
          customZones[idx].vertices = coords;
        }
      });

      await callWS('ha_clss_shade/save_zones', {
        entry_id: activeEntry.entry_id,
        zones: customZones,
      });

      dirty = false;
      btn.textContent = 'Shranjeno!';
      setStatus(activeEntry.title + ' — ' + customZones.length + ' con (shranjeno)');
      setTimeout(function() { btn.textContent = 'Shrani'; btn.disabled = false; }, 1500);
    } catch(e) {
      btn.textContent = 'Napaka!';
      setStatus('Napaka pri shranjevanju: ' + e.message);
      setTimeout(function() { btn.textContent = 'Shrani'; btn.disabled = false; }, 2000);
    }
  });

  // ─── Helpers ───
  function markDirty() {
    dirty = true;
    setStatus(activeEntry.title + ' — ' + customZones.length + ' con (neshranjeno)');
  }

  function setStatus(text) {
    document.getElementById('status').textContent = text;
  }

  // Warn on leaving with unsaved changes
  window.addEventListener('beforeunload', function(e) {
    if (dirty) {
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // ─── Start ───
  init();

})();
</script>

<!-- 3D Viewer module -->
<script type="module">
  import { TerrainViewer } from './viewer3d.js';

  let viewer = null;
  let terrainLoaded = false;
  let mode = '2d'; // '2d' or '3d'
  let wsConn = null; // reusable WebSocket for 3D ops

  const btn2d = document.getElementById('btn-2d');
  const btn3d = document.getElementById('btn-3d');
  const mapDiv = document.getElementById('map');
  const viewer3dDiv = document.getElementById('viewer3d');
  const loading3d = document.getElementById('loading3d');

  function switchMode(newMode) {
    mode = newMode;
    if (mode === '3d') {
      mapDiv.classList.add('hidden');
      viewer3dDiv.classList.add('active');
      btn3d.classList.add('active');
      btn2d.classList.remove('active');
      if (!viewer) {
        viewer = new TerrainViewer(viewer3dDiv);
        viewer.init();
        if (!terrainLoaded) loadTerrain();
      }
    } else {
      mapDiv.classList.remove('hidden');
      viewer3dDiv.classList.remove('active');
      btn2d.classList.add('active');
      btn3d.classList.remove('active');
    }
  }

  // Reusable WS call for 3D module
  let _ws3d = null;
  let _ws3dReady = null;
  let _ws3dMsgId = 100;
  let _ws3dPending = {};

  function _ensureWS3d() {
    if (_ws3d && _ws3d.readyState === WebSocket.OPEN) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const wsUrl = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/api/websocket';
      _ws3d = new WebSocket(wsUrl);
      _ws3d.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'auth_required') {
          const token = getAuthToken();
          if (token) _ws3d.send(JSON.stringify({ type: 'auth', access_token: token }));
          else reject(new Error('No auth token'));
        } else if (data.type === 'auth_ok') {
          resolve();
        } else if (data.type === 'auth_invalid') {
          reject(new Error('Auth failed'));
        } else if (data.id && _ws3dPending[data.id]) {
          const cb = _ws3dPending[data.id];
          delete _ws3dPending[data.id];
          if (data.success) cb.resolve(data.result);
          else cb.reject(new Error(data.error?.message || 'WS error'));
        }
      };
      _ws3d.onerror = () => reject(new Error('WebSocket error'));
    });
  }

  async function callWS3d(type, payload = {}) {
    await _ensureWS3d();
    const id = ++_ws3dMsgId;
    return new Promise((resolve, reject) => {
      _ws3dPending[id] = { resolve, reject };
      _ws3d.send(JSON.stringify({ id, type, ...payload }));
      setTimeout(() => {
        if (_ws3dPending[id]) { delete _ws3dPending[id]; reject(new Error('Timeout')); }
      }, 30000);
    });
  }

  async function loadTerrain() {
    loading3d.textContent = 'Nalagam 3D teren...';
    loading3d.style.display = 'block';
    try {
      const result = await callWS3d('ha_clss_shade/get_terrain');

      viewer.loadTerrain(result);
      terrainLoaded = true;
      loading3d.style.display = 'none';
      btnDraw3d.style.display = 'inline-block';

      // Load saved 3D zones
      try {
        const saved = await callWS3d('ha_clss_shade/get_3d_zones');
        if (saved.zones && saved.zones.length > 0) {
          for (const z of saved.zones) {
            const mesh = viewer._createZonePolygonMesh(z.points, z.color || '#2196F3');
            viewer.scene.add(mesh);
            viewer.completedZones.push({ name: z.name, color: z.color, points: z.points, mesh });
          }
          console.log(`Loaded ${saved.zones.length} saved 3D zones`);
        }
        update3dZoneList();
      } catch(e) { console.warn('Could not load 3D zones:', e); }

      // Listen for draw events
      viewer3dDiv.addEventListener('draw-point', (e) => {
        const { x, y, z, count } = e.detail;
        drawStatus.style.display = 'inline';
        drawStatus.textContent = `${count} točk — klik za naslednjo, [Zaključi] za poligon`;
        if (count >= 3) btnFinish3d.style.display = 'inline-block';
      });

      viewer3dDiv.addEventListener('draw-finish', (e) => {
        const { name, points } = e.detail;
        drawStatus.textContent = `Cona "${name}" shranjena (${points.length} točk)`;
        setTimeout(() => { drawStatus.style.display = 'none'; }, 3000);
      });

      // Listen for info clicks (not drawing)
      viewer3dDiv.addEventListener('terrain-click', (e) => {
        const { x, y, z, meshName } = e.detail;
        loading3d.style.display = 'block';
        loading3d.textContent = `Klik: (${x.toFixed(1)}, ${y.toFixed(1)}, ${z.toFixed(1)}) na ${meshName}`;
        setTimeout(() => { loading3d.style.display = 'none'; }, 3000);
      });

    } catch (e) {
      loading3d.textContent = 'Napaka: ' + e.message;
      console.error('3D terrain load error:', e);
    }
  }

  function getAuthToken() {
    // Method 1: from URL hash (HA panel passes it)
    const hash = window.location.hash;
    if (hash) {
      try {
        const params = new URLSearchParams(hash.substring(1));
        const token = params.get('token');
        if (token) return token;
      } catch(e) {}
    }
    // Method 2: try parent window
    try {
      if (window.parent && window.parent.__hass) {
        return window.parent.__hass.auth.data.access_token;
      }
    } catch(e) {}
    // Method 3: from hassConnection in main script
    try {
      if (window._hassConnection) {
        return window._hassConnection.auth.data.access_token;
      }
    } catch(e) {}
    // Method 4: long-lived token from localStorage
    try {
      const stored = localStorage.getItem('hassTokens');
      if (stored) {
        const tokens = JSON.parse(stored);
        return tokens.access_token;
      }
    } catch(e) {}
    return null;
  }

  const btnDraw3d = document.getElementById('btn-draw3d');
  const btnFinish3d = document.getElementById('btn-finish3d');
  const btnCancel3d = document.getElementById('btn-cancel3d');
  const drawStatus = document.getElementById('draw3d-status');

  btnDraw3d.addEventListener('click', () => {
    if (!viewer) return;
    viewer.startDrawing();
    btnDraw3d.style.display = 'none';
    btnCancel3d.style.display = 'inline-block';
    drawStatus.style.display = 'inline';
    drawStatus.textContent = 'Klikni na teren za prvo točko...';
  });

  btnFinish3d.addEventListener('click', async () => {
    if (!viewer) return;
    const name = prompt('Ime 3D cone:', 'nova_cona_3d');
    if (!name) { viewer.cancelDrawing(); }
    else {
      const color = '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');
      viewer.finishDrawing(name, color);

      // Save all 3D zones to HA
      try {
        const zonesToSave = viewer.completedZones.map(z => ({
          name: z.name, color: z.color, points: z.points, zone_type: 'custom',
        }));
        await callWS3d('ha_clss_shade/save_3d_zones', { zones: zonesToSave });
        drawStatus.textContent = `Cona "${name}" shranjena!`;
        update3dZoneList();
      } catch(e) {
        drawStatus.textContent = 'Napaka pri shranjevanju: ' + e.message;
        console.error('Save 3D zones error:', e);
      }
    }
    btnDraw3d.style.display = 'inline-block';
    btnFinish3d.style.display = 'none';
    btnCancel3d.style.display = 'none';
  });

  btnCancel3d.addEventListener('click', () => {
    if (viewer) viewer.cancelDrawing();
    btnDraw3d.style.display = 'inline-block';
    btnFinish3d.style.display = 'none';
    btnCancel3d.style.display = 'none';
    drawStatus.style.display = 'none';
  });

  const zoneList3d = document.getElementById('zone-list-3d');
  const zoneList3dItems = document.getElementById('zone-list-3d-items');

  function update3dZoneList() {
    if (!viewer) return;
    zoneList3dItems.innerHTML = '';
    if (viewer.completedZones.length === 0) {
      zoneList3d.style.display = 'none';
      return;
    }
    zoneList3d.style.display = 'block';
    for (let i = 0; i < viewer.completedZones.length; i++) {
      const z = viewer.completedZones[i];
      const div = document.createElement('div');
      div.className = 'zone-item';
      div.innerHTML = `
        <span class="color-dot" style="background:${z.color || '#2196F3'}"></span>
        <span class="name">${z.name}</span>
        <span class="type">3D (${z.points.length})</span>
        <button class="delete-btn" data-idx="${i}" title="Izbriši">✕</button>
      `;
      div.querySelector('.delete-btn').addEventListener('click', async (e) => {
        e.stopPropagation();
        const idx = parseInt(e.target.dataset.idx);
        const zone = viewer.completedZones[idx];
        if (zone.mesh) { viewer.scene.remove(zone.mesh); }
        viewer.completedZones.splice(idx, 1);
        update3dZoneList();
        // Save updated list
        try {
          const zonesToSave = viewer.completedZones.map(z => ({
            name: z.name, color: z.color, points: z.points, zone_type: 'custom',
          }));
          await callWS3d('ha_clss_shade/save_3d_zones', { zones: zonesToSave });
        } catch(err) { console.error('Delete save error:', err); }
      });
      zoneList3dItems.appendChild(div);
    }
  }

  btn2d.addEventListener('click', () => {
    if (viewer && viewer.drawingMode) viewer.cancelDrawing();
    btnDraw3d.style.display = 'none';
    btnFinish3d.style.display = 'none';
    btnCancel3d.style.display = 'none';
    drawStatus.style.display = 'none';
    zoneList3d.style.display = 'none';
    switchMode('2d');
  });
  btn3d.addEventListener('click', () => switchMode('3d'));
</script>
